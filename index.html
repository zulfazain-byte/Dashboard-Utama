<!DOCTYPE html>
<html lang="id" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cibitung Frozen - ERP v4.0 (Stok + Akuntansi)</title>
  <!-- Tailwind + Icons -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <!-- Library IndexedDB -->
  <script src="https://cdn.jsdelivr.net/npm/localforage@1.10.0/dist/localforage.min.js"></script>
  <!-- Chart.js & SheetJS (siap pakai) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <style>
    /* Sama seperti sebelumnya (custom scroll, toggle, dll) – silakan salin dari kode sebelumnya */
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; }
    .tab-content { display: none; opacity: 0; transition: opacity 0.3s; }
    .tab-content.active { display: block; opacity: 1; }
    /* Toggle switch */
    .toggle-checkbox { width: 1.25rem; height: 1.25rem; border-radius: 9999px; border: 2px solid #cbd5e1; background: white; cursor: pointer; position: absolute; top: 0; left: 0; z-index: 10; transition: all 0.25s; appearance: none; }
    .toggle-checkbox:checked { left: 1.25rem; border-color: #2563eb; }
    .toggle-label { display: block; width: 2.75rem; height: 1.4rem; background: #cbd5e1; border-radius: 9999px; cursor: pointer; position: relative; }
    .toggle-checkbox:checked + .toggle-label { background: #2563eb; }
    /* dll... */
  </style>
</head>
<body class="text-slate-800 flex flex-col min-h-screen">

<!-- Top Navigation -->
<nav class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
  <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg">
        <i class="ph-fill ph-fish-simple text-2xl"></i>
      </div>
      <div>
        <span class="font-bold text-xl text-slate-900">Cibitung<span class="text-blue-600">Frozen</span></span>
        <p class="text-[10px] uppercase font-bold tracking-widest text-slate-400 -mt-1">ERP v4.0</p>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <button onclick="backupData()" class="text-sm font-medium text-slate-600 hover:text-blue-600 transition"><i class="ph ph-download-simple"></i> Backup</button>
      <button onclick="restoreDataPrompt()" class="text-sm font-medium text-slate-600 hover:text-blue-600 transition"><i class="ph ph-upload-simple"></i> Restore</button>
    </div>
  </div>
</nav>

<!-- Main Layout -->
<div class="max-w-7xl mx-auto px-4 py-6 w-full flex-1 flex flex-col lg:flex-row gap-6">

  <!-- Sidebar -->
  <aside class="lg:w-72 flex-shrink-0">
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden sticky top-24">
      <div class="p-5 border-b border-slate-100 bg-slate-50/50">
        <h3 class="font-bold text-slate-800 text-sm uppercase tracking-wider">Modul</h3>
      </div>
      <div class="p-3 space-y-1" id="tabs">
        <button onclick="switchTab('tab-dashboard')" data-tab="tab-dashboard" class="tab-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left transition active bg-blue-50 text-blue-700">
          <i class="ph ph-chart-bar text-lg"></i> Dashboard
        </button>
        <button onclick="switchTab('tab-stock')" data-tab="tab-stock" class="tab-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left transition">
          <i class="ph ph-package text-lg"></i> Stok & Batch
        </button>
        <button onclick="switchTab('tab-sales')" data-tab="tab-sales" class="tab-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left transition">
          <i class="ph ph-shopping-cart text-lg"></i> Penjualan
        </button>
        <button onclick="switchTab('tab-finance')" data-tab="tab-finance" class="tab-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left transition">
          <i class="ph ph-wallet text-lg"></i> Keuangan
        </button>
        <button onclick="switchTab('tab-settings')" data-tab="tab-settings" class="tab-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left transition">
          <i class="ph ph-gear text-lg"></i> Pengaturan
        </button>
      </div>
    </div>
  </aside>

  <!-- Content -->
  <main class="flex-1 min-w-0">
    <!-- TAB DASHBOARD -->
    <div id="tab-dashboard" class="tab-content active space-y-6">
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
        <h2 class="text-xl font-bold mb-4">Ringkasan Hari Ini</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="dashboardSummary"></div>
        <div class="mt-6">
          <h3 class="font-semibold mb-2">Batch Hampir Kadaluarsa (≤ 7 hari)</h3>
          <div id="expiringBatches" class="text-sm text-slate-600">Memuat...</div>
        </div>
      </div>
    </div>

    <!-- TAB STOK & BATCH -->
    <div id="tab-stock" class="tab-content space-y-6">
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
        <h2 class="text-xl font-bold mb-4">Stok Saat Ini</h2>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="bg-slate-50">
              <tr><th class="p-3 text-left">Produk</th><th class="p-3 text-right">Total Stok (kg)</th><th class="p-3 text-right">Batch Aktif</th><th class="p-3 text-right">Aksi</th></tr>
            </thead>
            <tbody id="stockTableBody"></tbody>
          </table>
        </div>
        <hr class="my-6">
        <h3 class="font-semibold mb-2">Tambah Stok Baru</h3>
        <form id="addStockForm" class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <select id="stockProduk" class="p-2 border rounded-lg" required>
            <option value="">Pilih Produk</option>
            <!-- akan diisi oleh JS -->
          </select>
          <input type="number" id="stockBerat" placeholder="Berat (kg)" class="p-2 border rounded-lg" required>
          <input type="number" id="stockHargaBeli" placeholder="Harga Beli /kg" class="p-2 border rounded-lg" required>
          <input type="date" id="stockTglProduksi" class="p-2 border rounded-lg" required>
          <input type="date" id="stockTglKadaluarsa" class="p-2 border rounded-lg" required>
          <input type="number" id="stockOngkir" placeholder="Ongkir (total)" class="p-2 border rounded-lg" value="0">
          <button type="submit" class="bg-blue-600 text-white p-2 rounded-lg hover:bg-blue-700 transition">Simpan Batch</button>
        </form>
      </div>
    </div>

    <!-- TAB PENJUALAN -->
    <div id="tab-sales" class="tab-content space-y-6">
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
        <h2 class="text-xl font-bold mb-4">Catat Penjualan</h2>
        <form id="salesForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <input type="text" id="salesKlien" placeholder="Nama Klien" class="p-2 border rounded-lg" required>
          <select id="salesProduk" class="p-2 border rounded-lg" required>
            <option value="">Pilih Produk</option>
          </select>
          <input type="number" id="salesQty" placeholder="Jumlah (kg)" class="p-2 border rounded-lg" required>
          <select id="salesTier" class="p-2 border rounded-lg">
            <option value="ecer">Ecer</option>
            <option value="grosir">Grosir</option>
            <option value="partai">Partai Besar</option>
          </select>
          <input type="number" id="salesHargaManual" placeholder="Harga Jual /kg (opsional, override)" class="p-2 border rounded-lg">
          <button type="submit" class="bg-emerald-600 text-white p-2 rounded-lg hover:bg-emerald-700 transition col-span-full">Proses Penjualan</button>
        </form>
        <div class="mt-4 p-4 bg-slate-50 rounded-xl hidden" id="salesResult"></div>
      </div>
    </div>

    <!-- TAB KEUANGAN -->
    <div id="tab-finance" class="tab-content space-y-6">
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
        <h2 class="text-xl font-bold mb-4">Buku Besar & Laporan</h2>
        <div id="financeSummary" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6"></div>
        <button onclick="generateExcelReport()" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition"><i class="ph ph-file-xls"></i> Ekspor Excel</button>
      </div>
    </div>

    <!-- TAB PENGATURAN -->
    <div id="tab-settings" class="tab-content space-y-6">
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
        <h2 class="text-xl font-bold mb-4">Pengaturan Dasar</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div><label>PPN (%)</label><input type="number" id="setPPN" class="p-2 border rounded-lg w-full" value="12"></div>
          <div><label>PPh 25 (%)</label><input type="number" id="setPPh25" class="p-2 border rounded-lg w-full" value="2"></div>
          <div><label>PPh 21 (%)</label><input type="number" id="setPPh21" class="p-2 border rounded-lg w-full" value="5"></div>
          <div><label>PT Share (%)</label><input type="number" id="setPTShare" class="p-2 border rounded-lg w-full" value="60"></div>
          <div><label>Min Grosir (kg)</label><input type="number" id="setMinGrosir" class="p-2 border rounded-lg w-full" value="10"></div>
          <div><label>Min Partai (kg)</label><input type="number" id="setMinPartai" class="p-2 border rounded-lg w-full" value="500"></div>
          <div><label>Selisih Grosir dari Ecer (Rp)</label><input type="number" id="setSelisihGrosir" class="p-2 border rounded-lg w-full" value="5000"> <small class="text-slate-500">Ecer = Grosir + selisih ini</small></div>
        </div>
        <button onclick="saveSettings()" class="mt-4 bg-blue-600 text-white px-4 py-2 rounded-lg">Simpan Pengaturan</button>
      </div>
    </div>
  </main>
</div>

<script>
  // ==================== DATABASE LAYER ====================
  localforage.config({ name: 'CibitungFrozen', storeName: 'main' });

  // ==================== PRODUK LIST ====================
  const PRODUCT_LIST = [
    'Ikan Banjar', 'Ikan Dori Fillet', 'Ikan Layang', 'Ikan Belo',
    'Ikan Tongkol', 'Ikan Salem', 'Ikan Tenggiri', 'Ikan Bawal Laut', 'Cumi Cumi'
  ];

  // ==================== STOK & BATCH ====================
  async function getStockData() {
    let data = await localforage.getItem('stock_batches');
    if (!data) data = [];
    return data;
  }

  async function saveStockData(batches) {
    await localforage.setItem('stock_batches', batches);
  }

  async function addBatch(batch) {
    const batches = await getStockData();
    batches.push(batch);
    await saveStockData(batches);
    await updateDashboard();
    await renderStockTable();
  }

  // Alokasi stok secara FEFO (mengurangi batch yang paling dekat expired)
  async function allocateStock(productName, qtyNeeded) {
    const batches = await getStockData();
    // filter batch yang produknya sesuai, berat_sisa > 0, belum expired
    const now = new Date();
    const candidates = batches.filter(b => b.produk === productName && b.berat_sisa > 0 && new Date(b.tgl_kadaluarsa) > now);
    candidates.sort((a,b) => new Date(a.tgl_kadaluarsa) - new Date(b.tgl_kadaluarsa)); // FEFO
    let remaining = qtyNeeded;
    const usedBatches = [];
    for (let b of candidates) {
      if (remaining <= 0) break;
      const ambil = Math.min(b.berat_sisa, remaining);
      b.berat_sisa -= ambil;
      remaining -= ambil;
      usedBatches.push({ id: b.id, nama_produk: b.produk, qty: ambil, harga_per_kg: b.hpp_per_kg });
      if (b.berat_sisa === 0) b.status = 'habis';
    }
    if (remaining > 0) throw new Error(`Stok ${productName} tidak mencukupi, kurang ${remaining.toFixed(1)} kg`);
    await saveStockData(batches);
    return usedBatches;  // untuk perhitungan HPP aktual
  }

  async function renderStockTable() {
    const batches = await getStockData();
    const summary = {};
    PRODUCT_LIST.forEach(p => summary[p] = 0);
    batches.forEach(b => { if (b.berat_sisa > 0) summary[b.produk] = (summary[b.produk] || 0) + b.berat_sisa; });
    const tbody = document.getElementById('stockTableBody');
    tbody.innerHTML = PRODUCT_LIST.map(p => {
      const total = summary[p]?.toFixed(1) || 0;
      const batchesAktif = batches.filter(b => b.produk === p && b.berat_sisa > 0).length;
      return `<tr class="border-b">
        <td class="p-3">${p}</td>
        <td class="p-3 text-right font-semibold">${total} kg</td>
        <td class="p-3 text-right">${batchesAktif}</td>
        <td class="p-3 text-right"><button onclick="lihatBatch('${p}')" class="text-blue-600 text-sm">Detail</button></td>
      </tr>`;
    }).join('');
  }

  window.lihatBatch = async (produk) => {
    const batches = await getStockData();
    const filtered = batches.filter(b => b.produk === produk);
    alert(filtered.map(b => `Batch ${b.id}: ${b.berat_sisa} kg, Exp: ${b.tgl_kadaluarsa}`).join('\n'));
  };

  // ==================== PENJUALAN ====================
  async function processSale(klien, produk, qty, tier, manualHarga) {
    // harga dari pengaturan
    const settings = await getSettings();
    const usedBatches = await allocateStock(produk, qty);
    const totalHPP = usedBatches.reduce((sum, b) => sum + b.qty * b.harga_per_kg, 0);
    // Hitung harga dasar ecer
    const margin = 15000; // bisa diambil dari input nanti
    const hppAvg = totalHPP / qty;
    let hargaEcer = hppAvg + margin; // default
    // Terapkan selisih grosir
    const selisih = settings.selisihGrosir || 5000;
    let hargaJual = hargaEcer;
    if (tier === 'grosir') hargaJual = hargaEcer - selisih; // Grosir lebih murah
    else if (tier === 'partai') hargaJual = manualHarga || hargaEcer; // Partai sesuai input
    if (manualHarga && tier !== 'partai') hargaJual = manualHarga; // override manual
    const dppTotal = hargaJual * qty;
    const ppn = dppTotal * (settings.ppn / 100);
    const totalInvoice = dppTotal + ppn;
    // Buat jurnal
    await createJournal(klien, produk, qty, dppTotal, ppn, totalHPP);
    return { usedBatches, totalInvoice, hargaJual };
  }

  // ==================== JURNAL AKUNTANSI ====================
  async function getJournals() {
    let j = await localforage.getItem('journals');
    return j || [];
  }
  async function addJournal(entry) {
    const journals = await getJournals();
    journals.push(entry);
    await localforage.setItem('journals', journals);
  }

  async function createJournal(klien, produk, qty, dpp, ppn, hpp) {
    const now = new Date().toISOString();
    const entry = {
      id: Date.now(),
      tanggal: now,
      deskripsi: `Penjualan ${produk} ${qty} kg ke ${klien}`,
      entries: [
        { akun: 'Piutang Dagang', debet: dpp+ppn, kredit: 0 },
        { akun: 'Penjualan', debet: 0, kredit: dpp },
        { akun: 'PPN Keluaran', debet: 0, kredit: ppn },
        { akun: 'HPP', debet: hpp, kredit: 0 },
        { akun: 'Persediaan', debet: 0, kredit: hpp },
      ]
    };
    await addJournal(entry);
  }

  // ==================== SETTINGS ====================
  async function getSettings() {
    let s = await localforage.getItem('settings');
    if (!s) {
      s = { ppn: 12, pph25: 2, pph21: 5, ptShare: 60, minGrosir: 10, minPartai: 500, selisihGrosir: 5000 };
      await localforage.setItem('settings', s);
    }
    return s;
  }
  async function saveSettings() {
    const s = {
      ppn: parseFloat(document.getElementById('setPPN').value),
      pph25: parseFloat(document.getElementById('setPPh25').value),
      pph21: parseFloat(document.getElementById('setPPh21').value),
      ptShare: parseFloat(document.getElementById('setPTShare').value),
      minGrosir: parseFloat(document.getElementById('setMinGrosir').value),
      minPartai: parseFloat(document.getElementById('setMinPartai').value),
      selisihGrosir: parseFloat(document.getElementById('setSelisihGrosir').value),
    };
    await localforage.setItem('settings', s);
    alert('Pengaturan disimpan');
  }

  // ==================== UI & INIT ====================
  function switchTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.classList.remove('bg-blue-50', 'text-blue-700');
      b.classList.add('text-slate-600');
      if (b.dataset.tab === tabId) {
        b.classList.add('bg-blue-50', 'text-blue-700');
        b.classList.remove('text-slate-600');
      }
    });
    if (tabId === 'tab-stock') renderStockTable();
  }

  // Inisialisasi
  (async function init() {
    // Isi dropdown produk
    const productSelects = document.querySelectorAll('#stockProduk, #salesProduk');
    productSelects.forEach(sel => {
      sel.innerHTML = '<option value="">Pilih</option>' + PRODUCT_LIST.map(p => `<option>${p}</option>`).join('');
    });

    // Load pengaturan ke form
    const settings = await getSettings();
    document.getElementById('setPPN').value = settings.ppn;
    document.getElementById('setPPh25').value = settings.pph25;
    document.getElementById('setPPh21').value = settings.pph21;
    document.getElementById('setPTShare').value = settings.ptShare;
    document.getElementById('setMinGrosir').value = settings.minGrosir;
    document.getElementById('setMinPartai').value = settings.minPartai;
    document.getElementById('setSelisihGrosir').value = settings.selisihGrosir;

    // Handler tambah stok
    document.getElementById('addStockForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const batch = {
        id: 'BATCH_' + Date.now(),
        produk: document.getElementById('stockProduk').value,
        berat_awal: parseFloat(document.getElementById('stockBerat').value),
        berat_sisa: parseFloat(document.getElementById('stockBerat').value),
        harga_beli: parseFloat(document.getElementById('stockHargaBeli').value),
        ongkir: parseFloat(document.getElementById('stockOngkir').value) || 0,
        tgl_produksi: document.getElementById('stockTglProduksi').value,
        tgl_kadaluarsa: document.getElementById('stockTglKadaluarsa').value,
        hpp_per_kg: (parseFloat(document.getElementById('stockHargaBeli').value) * parseFloat(document.getElementById('stockBerat').value) + parseFloat(document.getElementById('stockOngkir').value)) / parseFloat(document.getElementById('stockBerat').value),
        status: 'aktif'
      };
      await addBatch(batch);
      alert('Batch berhasil ditambahkan');
      document.getElementById('addStockForm').reset();
    });

    // Handler penjualan
    document.getElementById('salesForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        const res = await processSale(
          document.getElementById('salesKlien').value,
          document.getElementById('salesProduk').value,
          parseFloat(document.getElementById('salesQty').value),
          document.getElementById('salesTier').value,
          parseFloat(document.getElementById('salesHargaManual').value) || null
        );
        document.getElementById('salesResult').classList.remove('hidden');
        document.getElementById('salesResult').innerHTML = `
          ✅ Penjualan berhasil!<br>
          Invoice: ${new Intl.NumberFormat('id-ID',{style:'currency',currency:'IDR'}).format(res.totalInvoice)}<br>
          Batch yang terpakai: ${res.usedBatches.map(b=>`${b.nama_produk} ${b.qty}kg`).join(', ')}
        `;
        await updateDashboard();
        await renderStockTable();
      } catch (err) {
        alert(err.message);
      }
    });

    // Dashboard awal
    await updateDashboard();
    await renderStockTable();
  })();

  async function updateDashboard() {
    const batches = await getStockData();
    const summary = {};
    PRODUCT_LIST.forEach(p => summary[p] = 0);
    batches.forEach(b => { if (b.berat_sisa > 0) summary[b.produk] += b.berat_sisa; });
    const now = new Date();
    const expiring = batches.filter(b => {
      const exp = new Date(b.tgl_kadaluarsa);
      return b.berat_sisa > 0 && (exp - now) / (1000*3600*24) <= 7;
    });
    document.getElementById('dashboardSummary').innerHTML = PRODUCT_LIST.map(p => `<div class="bg-white border rounded-xl p-4"><p class="text-sm text-slate-500">${p}</p><p class="text-2xl font-bold">${summary[p]?.toFixed(1)} kg</p></div>`).join('');
    const expHtml = expiring.length ? expiring.map(b => `<div class="text-red-600">• ${b.produk} batch ${b.id} sisa ${b.berat_sisa} kg, exp ${b.tgl_kadaluarsa}</div>`).join('') : '<div class="text-green-600">Aman, tidak ada batch kritis.</div>';
    document.getElementById('expiringBatches').innerHTML = expHtml;
  }

  function backupData() {
    Promise.all([
      localforage.getItem('stock_batches'),
      localforage.getItem('journals'),
      localforage.getItem('settings')
    ]).then(([batches, journals, settings]) => {
      const blob = new Blob([JSON.stringify({ batches, journals, settings }, null, 2)], {type: 'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `cfs_backup_${new Date().toISOString().slice(0,10)}.json`;
      a.click();
    });
  }

  function restoreDataPrompt() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = async (e) => {
      const file = e.target.files[0];
      const text = await file.text();
      const data = JSON.parse(text);
      if (data.batches) await localforage.setItem('stock_batches', data.batches);
      if (data.journals) await localforage.setItem('journals', data.journals);
      if (data.settings) await localforage.setItem('settings', data.settings);
      alert('Data berhasil dipulihkan!');
      location.reload();
    };
    input.click();
  }

  function generateExcelReport() {
    // Akan diisi dengan data jurnal, untuk demo sederhana
    alert('Fitur ekspor Excel akan datang di update berikutnya.');
  }

  // Handle bongkar muat & shrinkage (opsional) bisa ditambahkan di batch nanti.
<script src="https://cdn.jsdelivr.net/npm/localforage@1.10.0/dist/localforage.min.js"></script>
<script src="js/storage.js"></script>
<script src="js/settings.js"></script>
<script src="js/inventory.js"></script>
<script src="js/sales.js"></script>
<script src="js/accounting.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/app.js"></script>
</body>
